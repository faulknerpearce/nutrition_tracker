name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Install, typecheck, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build dependencies
        run: npm run build:shared && npm run build:mcp-server

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  test-shared:
    name: Test shared package
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run test:coverage -w @body-io/shared

      - name: Upload shared coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shared
          path: packages/shared/coverage
          if-no-files-found: ignore

  test-web:
    name: Test web package
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build:shared
      - run: npm run test:coverage -w @body-io/web

      - name: Upload web coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: packages/web/coverage
          if-no-files-found: ignore

  test-mcp:
    name: Test MCP server package
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build:shared
      - run: npm run test:coverage -w @body-io/mcp-server

      - name: Upload MCP coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-mcp
          path: packages/mcp-server/coverage
          if-no-files-found: ignore

  build:
    name: Build web app
    runs-on: ubuntu-latest
    needs: [test-shared, test-web, test-mcp]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder
